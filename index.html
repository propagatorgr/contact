<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Κατακόρυφο ελατήριο – Προσομοίωση</title>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>

  <style>
    /* Γενικό reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      color: #fff;
      font-family: system-ui, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Κεντρικό container */
    .app {
      width: 100%;
      max-width: 1000px;
      padding: 10px;
    }

    /* Περιοχή canvas */
    #sketch-holder {
      width: 100%;
      aspect-ratio: 3 / 2;         /* Responsive αναλογία */
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="sketch-holder"></div>
  </div>

  <!-- Το sketch.js σου -->
  <script src="sketch.js"></script>

  <script>
    /*
      Αν στο sketch.js ΔΕΝ χρησιμοποιείς createCanvas(...)
      με parent, βάλε μέσα στο setup():

        let c = createCanvas(900, 600);
        c.parent("sketch-holder");

      ώστε να “κάτσει” σωστά μέσα στο responsive container.
    */
  </script>
</body>
</html>
